name: Build and Release Windows App

on:
  push:
    tags:
      - 'v*'  # 当推送以 v 开头的标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: "pnpm"
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: Install frontend dependencies
      run: pnpm install
    
    - name: Build Tauri app
      run: pnpm tauri build
      env:
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    
    # 创建 Release（支持标签推送和手动触发）
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        files: |
          src-tauri/target/release/bundle/nsis/*.exe
        generate_release_notes: true
        draft: false
        prerelease: ${{ github.event_name == 'workflow_dispatch' }}
        name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Manual Build {0}', github.run_number) }}
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('manual-build-{0}', github.run_number) }}
        body: |
          ## 🚀 环境变量管理工具
          
          ### 📦 下载
          - **Windows 安装包**: `*.exe` 文件（NSIS 安装程序）
          
          ### 📋 更新内容
          ${{ startsWith(github.ref, 'refs/tags/') && '详见下方自动生成的更新日志。' || '这是一个手动构建版本，用于测试目的。' }}
          
          ### 🔧 安装说明
          1. 下载 `.exe` 文件
          2. 右键选择"以管理员身份运行"
          3. 按照安装向导完成安装
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # 上传构建产物作为 Artifact
    - name: Upload Windows installer
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer-${{ github.run_number }}
        path: src-tauri/target/release/bundle/nsis/*.exe
        retention-days: 30