name: Build and Release Windows App

on:
  push:
    tags:
      - 'v*'  # 当推送以 v 开头的标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc  # 指定 Windows 目标平台
    
    - name: Install frontend dependencies
      run: pnpm install
    
    - name: Build Tauri app
      run: pnpm tauri build
      env:
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}  # 如果使用了应用签名
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')  # 只在标签推送时创建发布
      with:
        files: |
          src-tauri/target/release/bundle/nsis/*.exe
          src-tauri/target/release/bundle/msi/*.msi
        generate_release_notes: true  # 自动生成发布说明
        draft: false  # 设为 true 可创建草稿发布
        prerelease: false  # 设为 true 可标记为预发布版本
        name: Release ${{ github.ref_name }}  # 发布名称
        body: |
          ## 🚀 新版本发布
          
          ### 📦 下载
          - **Windows 安装包 (推荐)**: `*.exe` 文件
          - **Windows MSI 包**: `*.msi` 文件
          
          ### 📋 更新内容
          详见下方自动生成的更新日志。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload Windows installer
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: src-tauri/target/release/bundle/nsis/*.exe