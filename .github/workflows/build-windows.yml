name: Build and Release Windows App

on:
  push:
    tags:
      - 'v*'  # 当推送以 v 开头的标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: "pnpm"
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: Install frontend dependencies
      run: pnpm install
    
    - name: Build Tauri app
      run: pnpm tauri build
      env:
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    
    # 修改：移除标签条件限制，支持手动触发也能创建 Release
    - name: Create Release
      uses: softprops/action-gh-release@v1
      # 只在推送标签时创建正式 Release，手动触发时创建预发布版本
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        # 修改：只包含实际生成的 NSIS 文件
        files: |
          src-tauri/target/release/bundle/nsis/*.exe
        generate_release_notes: true
        draft: false
        # 手动触发时标记为预发布版本
        prerelease: ${{ github.event_name == 'workflow_dispatch' }}
        # 动态生成 Release 名称
        name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Manual Build {0}', github.run_number) }}
        # 动态生成标签名（仅手动触发时）
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('manual-build-{0}', github.run_number) }}
        body: |
          ## 🚀 新版本发布
          
          ### 📦 下载
          - **Windows 安装包**: `*.exe` 文件
          
          ### 📋 更新内容
          ${{ startsWith(github.ref, 'refs/tags/') && '详见下方自动生成的更新日志。' || '这是一个手动构建版本，用于测试目的。' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload Windows installer
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: src-tauri/target/release/bundle/nsis/*.exe